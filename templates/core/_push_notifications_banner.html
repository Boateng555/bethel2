{% if church %}
<div data-bethel-push-banner data-church-id="{{ church.id }}"
     class="bethel-push-banner relative z-[200] isolate bg-[#1e3a8a] text-white px-4 py-3 shadow-md border-b border-[#1e40af]"
     style="position: relative; z-index: 200; pointer-events: auto;">
    <div class="max-w-4xl mx-auto flex flex-col sm:flex-row sm:items-center gap-3 sm:gap-4">
        <div class="flex items-start gap-3 flex-1 min-w-0 overflow-hidden">
            <span class="flex-shrink-0 w-10 h-10 rounded-full bg-white/15 flex items-center justify-center">
                <i class="fas fa-bell text-lg" aria-hidden="true"></i>
            </span>
            <div class="min-w-0 overflow-hidden">
                <p class="font-semibold text-sm sm:text-base">Get updates on your phone</p>
                <p class="text-xs sm:text-sm text-white/85 mt-0.5">New events, sermons, and news from {{ church.name }}</p>
                <p data-push-status class="text-xs text-yellow-200 mt-1 empty:hidden"></p>
            </div>
        </div>
        <div class="relative shrink-0 flex gap-2" style="z-index: 201; pointer-events: auto;">
            <button type="button" data-push-enable data-church-id="{{ church.id }}"
                    class="bg-white text-[#1e3a8a] px-4 py-2 rounded-lg text-sm font-semibold hover:bg-gray-100 transition cursor-pointer">
                Enable
            </button>
            <button type="button" data-push-dismiss data-church-id="{{ church.id }}"
                    class="text-white/90 px-3 py-2 text-sm hover:text-white transition cursor-pointer"
                    aria-label="Dismiss">
                Not now
            </button>
        </div>
    </div>
</div>
<script src="{% url 'push_notifications_js' %}?v=7"></script>
{% include 'core/_push_notification_settings.html' %}
{% endif %}
