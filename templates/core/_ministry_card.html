{% if church %}
<a href="{% url 'church_ministry_detail' church.id ministry.id %}" class="block bg-white rounded-lg shadow-lg overflow-hidden hover:shadow-lg transition flex flex-col h-full focus:outline-none focus:ring-2 focus:ring-[#1e3a8a]">
{% else %}
<a href="{% url 'ministry_detail' ministry.id %}" class="block bg-white rounded-lg shadow-lg overflow-hidden hover:shadow-lg transition flex flex-col h-full focus:outline-none focus:ring-2 focus:ring-[#1e3a8a]">
{% endif %}
    {% if ministry.image %}
        <img src="{{ ministry.get_image_url }}" alt="{{ ministry.name }}" class="w-full h-32 object-cover">
    {% else %}
        <div class="h-32 bg-gradient-to-r from-indigo-500 to-indigo-200 flex items-center justify-center">
            <i class="fas fa-hands-helping text-white text-6xl"></i>
        </div>
    {% endif %}
    <div class="p-6 flex flex-col flex-1">
        <h3 class="text-xl font-semibold mb-2 text-deep-blue line-clamp-2">{{ ministry.name }}</h3>
        <p class="text-gray-600 text-sm mb-4 line-clamp-2 flex-1">{{ ministry.description|truncatewords:15 }}</p>
        <span class="text-[#1e3a8a] font-semibold text-sm">Learn More →</span>
    </div>
</a>
