{% if church %}
<div id="bethel-push-settings-modal" data-church-id="{{ church.id }}"
     class="hidden fixed inset-0 z-[60] flex items-end sm:items-center justify-center bg-black/50 p-4"
     role="dialog" aria-labelledby="bethel-push-settings-title" aria-modal="true">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-md max-h-[90vh] overflow-y-auto">
        <div class="flex items-center justify-between px-5 py-4 border-b border-gray-200">
            <h2 id="bethel-push-settings-title" class="text-lg font-semibold text-gray-900">Notification settings</h2>
            <button type="button" data-push-settings-close
                    class="text-gray-400 hover:text-gray-600 p-1" aria-label="Close">
                <i class="fas fa-times text-xl"></i>
            </button>
        </div>
        <div class="px-5 py-4 space-y-4">
            <div class="flex items-center justify-between gap-4">
                <div class="min-w-0">
                    <p class="font-medium text-gray-900">Phone notifications</p>
                    <p class="text-sm text-gray-500 mt-0.5">Events, sermons, and news from {{ church.name }}</p>
                </div>
                <label class="relative inline-flex items-center cursor-pointer shrink-0">
                    <input type="checkbox" data-push-settings-toggle data-church-id="{{ church.id }}"
                           class="sr-only peer">
                    <span class="w-11 h-6 bg-gray-200 peer-focus:outline-none peer-focus:ring-2 peer-focus:ring-[#1e3a8a]/30 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-[#1e3a8a]"></span>
                </label>
            </div>
            <p data-push-settings-status data-church-id="{{ church.id }}" class="text-sm text-gray-600"></p>
            <p class="text-xs text-gray-500">On iPhone: add this site to your Home Screen (Share → Add to Home Screen) for the best experience.</p>
            <button type="button" data-push-show-prompt
                    class="text-sm text-[#1e3a8a] hover:underline font-medium">
                Show the reminder banner again
            </button>
        </div>
        <div class="px-5 py-4 border-t border-gray-200">
            <button type="button" data-push-settings-close
                    class="w-full py-2.5 rounded-lg bg-[#1e3a8a] text-white font-medium hover:bg-[#1e40af] transition">
                Done
            </button>
        </div>
    </div>
</div>
{% endif %}
