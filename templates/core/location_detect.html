{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finding your Bethel church…</title>
    <meta name="robots" content="noindex">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-[#1e3a8a] text-white flex flex-col items-center justify-center px-6 text-center">
    <img src="{% static 'img/bethel_logo.png' %}" alt="" class="w-16 h-16 rounded-full mb-6" width="64" height="64">
    <h1 class="text-xl font-semibold mb-2">Finding your Bethel church</h1>
    <p id="status" class="text-blue-100 text-sm max-w-sm">Please allow location access so we open <strong>Düsseldorf</strong> (not Frankfurt or Hamburg).</p>
    <div class="mt-8 w-10 h-10 border-4 border-white/30 border-t-white rounded-full animate-spin" aria-hidden="true"></div>
    <p class="mt-8 text-xs text-blue-200">
        <a href="{% url 'church_list' %}?choose_church=1" class="underline">Pick church manually</a>
    </p>
    {{ churches_json|json_script:"churches-data" }}
    <script>
    (function() {
        var status = document.getElementById('status');
        var churches = [];
        try {
            churches = JSON.parse(document.getElementById('churches-data').textContent);
        } catch (e) {}

        function getCookie(name) {
            var v = document.cookie.match('(^|;)\\s*' + name + '\\s*=\\s*([^;]+)');
            return v ? v.pop() : '';
        }

        function haversineKm(lat1, lon1, lat2, lon2) {
            var R = 6371;
            var p1 = lat1 * Math.PI / 180;
            var p2 = lat2 * Math.PI / 180;
            var dLat = (lat2 - lat1) * Math.PI / 180;
            var dLon = (lon2 - lon1) * Math.PI / 180;
            var a = Math.sin(dLat/2)*Math.sin(dLat/2) +
                Math.cos(p1)*Math.cos(p2)*Math.sin(dLon/2)*Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function saveAndGo(churchId, lat, lon) {
            var body = new URLSearchParams({ church_id: churchId });
            if (lat != null && lon != null) {
                body.set('lat', lat);
                body.set('lon', lon);
            }
            return fetch('{% url "save_my_church" %}', {
                method: 'POST',
                headers: {
                    'X-CSRFToken': getCookie('csrftoken'),
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: body.toString(),
                credentials: 'same-origin',
            }).then(function(r) { return r.json(); });
        }

        function pickNearest(lat, lon) {
            var best = null;
            var bestDist = Infinity;
            churches.forEach(function(c) {
                var d = haversineKm(lat, lon, c.lat, c.lon);
                if (d < bestDist) {
                    bestDist = d;
                    best = c;
                }
            });
            return best;
        }

        function fallbackList() {
            status.textContent = 'Could not detect location. Please choose your church.';
            setTimeout(function() {
                window.location.href = '{% url "church_list" %}?choose_church=1';
            }, 1500);
        }

        if (!navigator.geolocation || !churches.length) {
            fallbackList();
            return;
        }

        navigator.geolocation.getCurrentPosition(
            function(pos) {
                var lat = pos.coords.latitude;
                var lon = pos.coords.longitude;
                var nearest = pickNearest(lat, lon);
                if (!nearest) {
                    fallbackList();
                    return;
                }
                status.textContent = 'Opening ' + (nearest.city || 'your church') + '…';
                saveAndGo(nearest.id, lat, lon).then(function(data) {
                    if (data.ok && data.redirect) {
                        window.location.replace(data.redirect);
                    } else {
                        fallbackList();
                    }
                }).catch(fallbackList);
            },
            function() {
                status.textContent = 'Location permission needed for automatic redirect.';
                setTimeout(fallbackList, 2000);
            },
            { enableHighAccuracy: true, timeout: 20000, maximumAge: 60000 }
        );
    })();
    </script>
</body>
</html>
